seed: 7
run_name: pack_3p6s_spme
backend: liionpack

env:
  parameter_set: Chen2020
  nproc: 16
  Rb: 1.5e-6
  Rc: 5e-3  # Rc=0.01（10 mΩ）：可能偏大或偏保守
  Ri_init: 5e-3
  ocv_init: 3.5  # ocv_init=4.0：作为“初值猜测”勉强可以，但会增加求解压力reset 里 initial_soc 在 0.2~0.3，而对应 OCV 通常不在 4.0V 这么高的区间（具体看参数集/OCV曲线）。
  dt: 10.0 # RL每10s决策一次
  max_steps: 720 #RL每个episode最多720步
  v_max: 4.2 #单体电池最高电压
  t_max: 309.15 #单体电池最高温度 （单位K即60℃）
  pack_cells_p: 3 #电池包并联3个单体电池
  pack_cells_s: 6 #电池包串联6个单体电池
  terminate_on_violation: true #是否在违反约束时终止episode
  observation: 
    include_std: true #包含电池单体电压和温度的标准差->考虑电池单体间的差异
  htc: 100.0
  # ===== reset 随机性 =====
  soc_init_low: 0.2
  soc_init_high: 0.3
  soc_sigma_reset: 0.01   # ⭐ 新增：cell-level SOC 不一致标准差

reward:
  w_soc: 50.0      # 奖励 SOC 增加
  w_time: 0.003     # 惩罚时间步 (原 0.01 -> 0.05)
  w_v: 100.0       # 强电压惩罚 (原 2.0 -> 100.0)
  w_t: 1.0         # 温度惩罚
  w_const: 20.0    # [新增] 一致性惩罚 (SOC std)
  # enable_pack_extensions: false

rl:
  gamma: 0.99
  actor_lr: 0.001
  critic_lr: 0.0001
  tau: 0.005
  batch_size: 64
  buffer_size: 50000
  exploration_sigma: 0.3
  action_low: -30.0
  action_high: 0.0
  train_steps_per_epoch: 200

surrogate:
  hidden_sizes: [128, 128]
  ensemble_size: 5
  learning_rate: 0.001

trainer:
  cycle0:
    real_episodes: 50
    surrogate_epochs: 25
    policy_epochs: 100
  adaptive:
    cycles: 2
    real_episodes_per_cycle: 30
    surrogate_epochs: 20
    policy_epochs: 100

soh_prior:
  enabled: false
  lambda_prior: 1.0
  theta_dim: 3
  dummy_soh: 0.95

logging:
  runs_dir: runs
  save_interval: 1
